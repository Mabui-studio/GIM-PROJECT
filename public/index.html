<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Majestic Betta V6.3 - Hybrid Evolution (FIXED)</title>
    <style>
        :root { --primary: #0080ff; }
        body { margin: 0; background: #1a365d; overflow: hidden; font-family: 'Segoe UI', sans-serif; transition: background 0.5s; color: white; }
        canvas { display: block; }

        /* UI Management */
        .panel { position: fixed; top: 0; bottom: 0; width: 260px; background: rgba(0, 0, 0, 0.85); padding: 20px; transition: 0.4s; z-index: 100; pointer-events: auto; overflow-y: auto; }
        #left-panel { left: 0; transform: translateX(-100%); border-right: 1px solid var(--primary); }
        #right-panel { right: 0; transform: translateX(100%); border-left: 1px solid var(--primary); }
        .panel.active { transform: translateX(0); }

        /* Gacha System */
        #gacha-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .gacha-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; margin: 30px; }
        .gacha-card { width: 100px; height: 130px; background: #222; border: 2px solid #444; border-radius: 10px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.2s; }
        .gacha-card.selected { border-color: gold; box-shadow: 0 0 15px gold; transform: scale(1.05); }

        /* Zen Mode Clock */
        #zen-clock { position: absolute; top: 50px; right: 50px; font-size: 3rem; font-weight: bold; cursor: move; display: none; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
        
        /* Stats & HUD */
        #hud { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; background: rgba(0,0,0,0.5); padding: 10px 30px; border-radius: 50px; pointer-events: none; }
        .stat-item { display: flex; flex-direction: column; align-items: center; }
        .stat-val { font-weight: bold; font-size: 1.2rem; }

        #breed-result { font-size: 0.85rem; line-height: 1.4; margin-top: 12px; padding: 10px; background: rgba(0,128,255,0.15); border-radius: 8px; border: 1px solid rgba(0,128,255,0.35); min-height: 3em; }

        button { cursor: pointer; padding: 10px 15px; background: var(--primary); border: none; color: white; border-radius: 5px; font-weight: bold; margin: 5px 0; width: 100%; }
        #exit-zen { position: fixed; bottom: 20px; right: 20px; display: none; opacity: 0.3; }
        #exit-zen:hover { opacity: 1; }
    </style>
</head>
<body>

<div id="gacha-overlay">
    <h1>เลือกปลาของคุณ (3 จาก 10)</h1>
    <div class="gacha-grid" id="gacha-grid"></div>
    <button style="width: 200px;" id="start-btn" disabled onclick="startGame()">เริ่มเลี้ยงปลา</button>
</div>

<div id="hud">
    <div class="stat-item"><span>แต้ม Care ✨</span><span id="care-val" class="stat-val">0</span></div>
    <div class="stat-item"><span>O₂</span><span id="o2-val" class="stat-val">100</span></div>
    <div class="stat-item"><span>Waste</span><span id="waste-val" class="stat-val">0</span></div>
</div>

<div id="left-panel" class="panel">
    <h3>จัดการปลา</h3>
    <button onclick="triggerRomance()">❤️ ผสมพันธุ์ (Romance)</button>
    <p style="font-size:0.8rem; opacity:0.85; margin:8px 0;">ใช้อัลกอริทึม Betta Master 2026: แม่=F พ่อ=M · สถิติ/ความแม่นยำ/สายเลือด</p>
    <div id="breed-result">ผลผสมล่าสุดจะแสดงที่นี่</div>
    <button onclick="toggleVitality()">เปิด/ปิด หลอดเลือด</button>
    <hr>
    <label>เลือกสีตู้</label>
    <div style="display: flex; gap: 5px; margin-top: 10px;">
        <div style="background:#0b3c6f; width:30px; height:30px; cursor:pointer;" onclick="setBG('#0b3c6f')"></div>
        <div style="background:#6ec6ff; width:30px; height:30px; cursor:pointer;" onclick="setBG('#6ec6ff')"></div>
        <div style="background:#b9f6ca; width:30px; height:30px; cursor:pointer;" onclick="setBG('#b9f6ca')"></div>
        <div style="background:#fff59d; width:30px; height:30px; cursor:pointer;" onclick="setBG('#fff59d')"></div>
        <div style="background:#d7ccc8; width:30px; height:30px; cursor:pointer;" onclick="setBG('#d7ccc8')"></div>
    </div>
</div>

<div id="right-panel" class="panel">
    <h3>ร้านค้า</h3>
    <button id="buy-feeder" onclick="buyAutoFeeder()">ซื้อเครื่องให้อาหาร (100 ✨)</button>
    <button onclick="addSeaweed()">เพิ่มสาหร่าย</button>
    <button onclick="toggleZen()">เข้าโหมด Zen</button>
</div>

<div style="position:fixed; bottom:20px; left:20px; z-index:200;">
    <button onclick="togglePanel('left')" style="width:60px;">🐟</button>
    <button onclick="togglePanel('right')" style="width:60px;">🛒</button>
</div>

<div id="zen-clock">00:00</div>
<button id="exit-zen" onclick="toggleZen()">Exit Zen</button>

<canvas id="aquarium"></canvas>

<script src="./game.js"></script>
</body>
</html>
